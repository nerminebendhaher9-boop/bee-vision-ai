model:
  weights: models/weights/best.pt
  confidence: 0.75
  iou: 0.50
  imgsz: 416
  device: "cpu"
  half: false

classes:
  0: queen

camera:
  source: 0
  width: 640
  height: 480
  fps_target: 10
  buffer_size: 1

tracking:
  track_high_thresh: 0.50
  track_low_thresh: 0.10
  new_track_thresh: 0.60
  track_buffer: 30
  match_thresh: 0.80

alerts:
  save: true
  save_dir: alerts/
  cooldown_seconds: 5
  jpeg_quality: 92
  crop_padding: 40

server:
  host: "0.0.0.0"
  port_range: [10000, 10000]  # Render uses PORT env var

visualization:
  queen_color: [0, 180, 255]
  bbox_thickness: 2
  font_scale: 0.6
  show_confidence: true
  show_track_id: true