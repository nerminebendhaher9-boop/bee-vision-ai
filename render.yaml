services:
  # Backend Web Service
  - type: web
    name: bee-vision-ai-b
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: |
      python --version
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      python --version
      gunicorn wsgi:application -k gevent -w 1 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.14
      - key: RENDER
        value: "true"
      - key: PIP_DEFAULT_TIMEOUT
        value: "100"
    disk:
      name: alerts
      mountPath: /opt/render/project/src/backend/alerts
      sizeGB: 1
  # Frontend Static Site
  - type: static
    name: bee-vision-ai
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://bee-vision-ai-b.onrender.com