services:
  - type: web
    name: bee-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application -k gevent -w 1 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: RENDER
        value: true
    disk:
      name: alerts
      mountPath: /opt/render/project/src/backend/alerts
      sizeGB: 1

  # Frontend static site
  - type: static
    name: bee-vision-ai
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://bee-vision-ai-b.onrender.com